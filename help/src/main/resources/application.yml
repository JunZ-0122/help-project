spring:
  jackson:
    serialization:
      write-dates-as-timestamps: false
  datasource:
    url: jdbc:mysql://localhost:3306/help?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8&useUnicode=true
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      database: ${REDIS_DATABASE:0}
  http:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.csi.help.entity
  configuration:
    map-underscore-to-camel-case: true

server:
  address: 0.0.0.0
  port: 8080
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

jwt:
  secret: CSIHelpJwtSecretKeyForPreviewAndDev1234567890

help:
  seed-demo-if-empty: true

amap:
  web-service-key: ${AMAP_WEB_SERVICE_KEY:979048b553c25febcd9efb0549d9526c}
  web-service-host: https://restapi.amap.com

app:
  sms:
    mock-mode:
      enabled: ${SMS_MOCK_MODE_ENABLED:true}
      return-code: ${SMS_MOCK_RETURN_CODE:true}
    code:
      ttl-seconds: ${SMS_CODE_TTL_SECONDS:300}
      cooldown-seconds: ${SMS_CODE_COOLDOWN_SECONDS:60}
      max-failures: ${SMS_CODE_MAX_FAILURES:5}
